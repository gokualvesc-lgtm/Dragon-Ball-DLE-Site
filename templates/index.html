<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGON BALL DLE</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }
        .title {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #a5b4fc;
        }
        .game-option {
            display: inline-block;
            padding: 1rem 2rem;
            background-color: #2563eb;
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 0.75rem;
            transition: background-color 0.2s ease;
        }
        .game-option:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">DRAGON BALL DLE</div>
        <div class="subtitle">Criado pro Daniel</div>
        <a class="game-option" href="/start">MODO COM IMAGEM</a>
    </div>
</body>
</html>
